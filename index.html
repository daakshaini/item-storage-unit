<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Item Storage Unit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:380px;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:20px;
color:#003366;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:5px;
background:#003366;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#0055aa;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

.error{
color:red;
font-size:13px;
margin-top:5px;
text-align:left;
}

.success{
color:green;
font-size:14px;
margin-top:10px;
}

.section{
margin-top:20px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Item Storage Unit</h1>

<button onclick="showSignup()">
Signup
</button>

<button onclick="showLogin()">
Login
</button>

<!-- SIGNUP SECTION -->

<div id="signupSection" class="section">

<h3>Create Account</h3>

<input type="text"
id="username"
placeholder="Username (2-6 numbers)">

<div id="userError" class="error"></div>

<input type="password"
id="password"
placeholder="Password">

<div id="passError" class="error"></div>

<input type="password"
id="confirmPassword"
placeholder="Confirm Password">

<div id="confirmError" class="error"></div>

<input type="text"
id="phone"
placeholder="+91XXXXXXXXXX">

<!-- RECAPTCHA -->

<div id="recaptcha-container"></div>

<button onclick="generateOTP()">
Get OTP
</button>

<input type="text"
id="otpInput"
placeholder="Enter OTP">

<button onclick="verifyOTP()">
Verify OTP
</button>

<div id="otpMessage"
class="success"></div>

<br><br>

<button onclick="createAccount()">
Create Account
</button>

<div id="signupSuccess"
class="success"></div>

</div>

<!-- LOGIN SECTION -->

<div id="loginSection"
class="section hidden">

<h3>Login</h3>

<input type="text"
id="loginUser"
placeholder="Username">

<input type="password"
id="loginPass"
placeholder="Password">

<div id="loginError"
class="error"></div>

<br>

<button onclick="login()">
Login
</button>

<div id="loginSuccess"
class="success"></div>

</div>

</div>

<!-- FIREBASE SDK -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyDNZcByFjkDinvcwLW8cRc5Cqzh3y-3yyk",

authDomain: "item-storage-unit.firebaseapp.com",

projectId: "item-storage-unit",

storageBucket: "item-storage-unit.firebasestorage.app",

messagingSenderId: "475789016815",

appId: "1:475789016815:web:6088880c6b9cdffaefe51a"

};

/* INITIALIZE FIREBASE */

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

/* GLOBAL VARIABLE */

let phoneVerified = false;

/* SHOW SIGNUP */

function showSignup(){

document.getElementById("signupSection")
.classList.remove("hidden");

document.getElementById("loginSection")
.classList.add("hidden");

}

/* SHOW LOGIN */

function showLogin(){

document.getElementById("signupSection")
.classList.add("hidden");

document.getElementById("loginSection")
.classList.remove("hidden");

}

/* RECAPTCHA */

window.onload = function(){

window.recaptchaVerifier =
new firebase.auth.RecaptchaVerifier(
'recaptcha-container',
{
size:'normal'
}
);

};

/* SEND OTP */

function generateOTP(){

let phone =
document.getElementById("phone").value;

if(phone==""){

alert("Please Enter Phone Number");

return;

}

auth.signInWithPhoneNumber(
phone,
window.recaptchaVerifier
)

.then(function(confirmationResult){

window.confirmationResult =
confirmationResult;

alert("OTP Sent Successfully");

})

.catch(function(error){

alert(error.message);

});

}

/* VERIFY OTP */

function verifyOTP(){

let code =
document.getElementById("otpInput").value;

confirmationResult.confirm(code)

.then(function(result){

phoneVerified = true;

document.getElementById("otpMessage")
.style.color = "green";

document.getElementById("otpMessage")
.innerText =
"Phone Verified Successfully";

})

.catch(function(error){

document.getElementById("otpMessage")
.style.color = "red";

document.getElementById("otpMessage")
.innerText =
"Invalid OTP";

});

}

/* CREATE ACCOUNT */

function createAccount(){

let username =
document.getElementById("username")
.value.trim();

let password =
document.getElementById("password")
.value;

let confirmPassword =
document.getElementById("confirmPassword")
.value;

/* PATTERNS */

let userPattern =
/^[0-9]{2,6}$/;

let passPattern =
/^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[\W]).{8,}$/;

/* CLEAR ERRORS */

document.getElementById("userError")
.innerText = "";

document.getElementById("passError")
.innerText = "";

document.getElementById("confirmError")
.innerText = "";

document.getElementById("signupSuccess")
.innerText = "";

/* USERNAME VALIDATION */

if(!userPattern.test(username)){

document.getElementById("userError")
.innerText =
"Username must contain 2-6 digits only";

return;

}

/* PASSWORD VALIDATION */

if(!passPattern.test(password)){

document.getElementById("passError")
.innerText =
"Password must contain uppercase, lowercase, number, special character and minimum 8 characters";

return;

}

/* PASSWORD MATCH */

if(password !== confirmPassword){

document.getElementById("confirmError")
.innerText =
"Passwords do not match";

return;

}

/* PHONE VERIFIED */

if(!phoneVerified){

alert("Please Verify Phone Number");

return;

}

/* SAVE DATA */

localStorage.setItem(
"username",
username
);

localStorage.setItem(
"password",
password
);

/* SUCCESS */

document.getElementById("signupSuccess")
.innerText =
"Account Created Successfully";

/* CLEAR INPUTS */

document.getElementById("username")
.value = "";

document.getElementById("password")
.value = "";

document.getElementById("confirmPassword")
.value = "";

document.getElementById("phone")
.value = "";

document.getElementById("otpInput")
.value = "";

phoneVerified = false;

}

/* LOGIN FUNCTION */

function login(){

let enteredUser =
document.getElementById("loginUser")
.value;

let enteredPass =
document.getElementById("loginPass")
.value;

let savedUser =
localStorage.getItem("username");

let savedPass =
localStorage.getItem("password");

/* CLEAR OLD MESSAGES */

document.getElementById("loginError")
.innerText = "";

document.getElementById("loginSuccess")
.innerText = "";

/* USERNAME CHECK */

if(enteredUser !== savedUser){

document.getElementById("loginError")
.innerText =
"Wrong Username";

return;

}

/* PASSWORD CHECK */

if(enteredPass !== savedPass){

document.getElementById("loginError")
.innerText =
"Wrong Password";

return;

}

/* SUCCESS */

document.getElementById("loginSuccess")
.innerText =
"Login Successful";

alert("Welcome to Item Storage Unit");

/* CLEAR */

document.getElementById("loginUser")
.value = "";

document.getElementById("loginPass")
.value = "";

}

</script>

</body>

</html>
